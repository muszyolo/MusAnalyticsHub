<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Mastery Hub</title>
    <link rel="stylesheet" href="language_hub_initial.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <aside class="sidebar">
        <button class="flag-btn active" data-lang="english" title="English (UK)">
            <img src="https://flagcdn.com/w80/gb.png" width="30" style="border-radius: 2px;">
        </button>
        <button class="flag-btn" data-lang="chinese" title="Chinese (China)">
            <img src="https://flagcdn.com/w80/cn.png" width="30" style="border-radius: 2px;">
        </button>
        <button class="flag-btn" data-lang="philippine" title="Philippine">
            <img src="https://flagcdn.com/w80/ph.png" width="30" style="border-radius: 2px;">
        </button>
        <button class="flag-btn" data-lang="korean" title="Korean">
            <img src="https://flagcdn.com/w80/kr.png" width="30" style="border-radius: 2px;">
        </button>

        <div class="thesis-timer" title="Days until Thesis Submission">
            <span class="days-count" id="days-count">0</span>
            DAYS
        </div>
    </aside>

    <main class="main-content">
        <header class="header">
            <h1 class="lang-title" id="lang-title">≡ƒç¼≡ƒçº English Mastery</h1>
            <p style="color: var(--text-secondary);">Your 12-week roadmap to fluency.</p>
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>

            <div class="search-container">
                <input type="text" id="youtube-search" placeholder="Search YouTube for lessons..." class="search-input">
                <button id="search-btn" class="search-btn" title="Search YouTube">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="white"><path d="M10 18a7.952 7.952 0 0 0 4.897-1.688l4.396 4.396 1.414-1.414-4.396-4.396A7.952 7.952 0 0 0 18 10c0-4.411-3.589-8-8-8s-8 3.589-8 8 3.589 8 8 8zm0-14c3.309 0 6 2.691 6 6s-2.691 6-6 6-6-2.691-6-6 2.691-6 6-6z"/></svg>
                </button>
                <a href="https://chat.deepseek.com" target="_blank" class="ai-btn deepseek" title="Open DeepSeek">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="black" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2ZM12 4C16.4183 4 20 7.58172 20 12C20 16.4183 16.4183 20 12 20C7.58172 20 4 16.4183 4 12C4 7.58172 7.58172 4 12 4ZM12 6L14 10H10L12 6ZM12 18L10 14H14L12 18ZM7 12L11 11V13L7 12ZM17 12L13 13V11L17 12Z"/></svg>
                    <span>DeepSeek</span>
                </a>
                <a href="https://chat.openai.com" target="_blank" class="ai-btn chatgpt" title="Open ChatGPT">

                    <span>ChatGPT</span>
                </a>
                <a href="https://gemini.google.com" target="_blank" class="ai-btn gemini" title="Open Gemini">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="black" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z"/></svg>
                    <span>Gemini</span>
                </a>
                <a href="https://notebooklm.google.com" target="_blank" class="ai-btn notebook" title="Open NotebookLM">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="black" xmlns="http://www.w3.org/2000/svg"><path d="M4 4V20H20V4H4ZM18 18H6V6H18V18ZM8 8H16V10H8V8ZM8 12H16V14H8V12ZM8 16H12V18H8V16Z"/></svg>
                    <span>NotebookLM</span>
                </a>
            </div>
        </header>

        <section id="roadmap-grid" class="roadmap-grid">
            <!-- Roadmap cards will be injected here by JS -->
        </section>

        <section class="resources-section">
            <h2 style="font-size: 1.5rem; margin-bottom: 1rem;">Free Online Resources</h2>
            <div id="resource-list" class="resource-list">
                <!-- Resources will be injected here by JS -->
            </div>
        </section>

        <section class="notes-section">
            <h2 style="font-size: 1.5rem;">Daily Study Notes</h2>
            <textarea id="daily-notes" class="notes-area" placeholder="Write your thoughts, vocabulary, or research ideas here..."></textarea>
        </section>
    </main>

    <script src="language_hub_initial_data.js"></script>
    <script src="language_hub_initial.js"></script>
</body>
</html>
